# App Config
spring.application.name=approve-products-service
server.port=8080

# PostgreSQL 
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:inventory_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logs
logging.level.com.nova.approve.products.service=INFO

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs